services:
  free-llm-gateway:
    build: .
    container_name: free-llm-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./.env:/app/.env:ro
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
