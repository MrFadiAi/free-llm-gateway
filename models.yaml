# Free LLM Gateway — Model definitions with provider fallback chains
# Only providers with API keys configured will be tried.
# Models are ordered: primary first, fallbacks after.

models:
  # ── Meta Llama ────────────────────────────────────────────────────────────
  llama-3.3-70b:
    capabilities:
      supports_tools: true
      supports_vision: false
      supports_streaming: true
    fallbacks:
      - provider: openrouter
        model: meta-llama/llama-3.3-70b-instruct:free
      - provider: nvidia
        model: meta/llama-3.1-405b-instruct

  llama-3.1-8b:
